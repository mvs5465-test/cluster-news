<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site_name }}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <a class="brand" href="{{ url_for('home') }}">{{ site_name }}</a>
          <p class="tagline">A quiet dashboard for feeds, headlines, and one-click briefings.</p>
        </div>
        <nav class="nav">
          <a href="{{ url_for('home') }}">Latest</a>
          <a href="{{ url_for('briefing') }}">Briefing</a>
          <a href="{{ url_for('home', saved=1) }}">Saved</a>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
